<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicSays - Ticket Details</title>
  <link rel="icon" type="image/png" href="logonobg.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c0a;
      color: #ffffff;
      overflow-x: hidden;
    }
    
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: linear-gradient(135deg, #0a0c0a 0%, #1a2a1a 50%, #0e1a0e 100%);
    }
    
    .bg-animation::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%);
      animation: rotate 30s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .navbar {
      position: sticky;
      top: 0;
      padding: 16px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 12, 10, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(230,126,34,0.2);
      z-index: 1000;
    }
    
    .logo img {
      height: 45px;
      width: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    
    .nav-buttons {
      display: flex;
      gap: 16px;
    }
    
    .nav-btn {
      padding: 10px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .nav-btn-outline {
      border: 2px solid rgba(230,126,34,0.5);
      color: #e67e22;
      background: transparent;
    }
    
    .nav-btn-outline:hover {
      border-color: #e67e22;
      background: rgba(230,126,34,0.1);
      transform: translateY(-2px);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 48px;
    }
    
    /* Three Column Layout - Fixed */
    .ticket-layout {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    
    .left-column {
      flex: 1;
      min-width: 280px;
    }
    
    .middle-column {
      flex: 1.5;
      min-width: 320px;
    }
    
    .right-column {
      flex: 1;
      min-width: 280px;
    }
    
    /* Cards */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 1px solid rgba(230,126,34,0.2);
      overflow: hidden;
      margin-bottom: 32px;
    }
    
    .card:last-child {
      margin-bottom: 0;
    }
    
    .card-header {
      background: rgba(230,126,34,0.08);
      padding: 18px 24px;
      border-bottom: 1px solid rgba(230,126,34,0.2);
    }
    
    .card-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: #e67e22;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .card-content {
      padding: 24px;
    }
    
    /* Info Rows */
    .info-row {
      margin-bottom: 20px;
    }
    
    .info-row:last-child {
      margin-bottom: 0;
    }
    
    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .info-value {
      font-size: 15px;
      color: #ffffff;
      line-height: 1.5;
      word-break: break-word;
    }
    
    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-pending {
      background: rgba(230,126,34,0.2);
      color: #f39c12;
    }
    
    .status-in_process {
      background: rgba(52,152,219,0.2);
      color: #5dade2;
    }
    
    .status-hold {
      background: rgba(149,165,166,0.2);
      color: #aab7b8;
    }
    
    .status-solved {
      background: rgba(46,204,113,0.2);
      color: #58d68d;
    }
    
    .type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      background: rgba(230,126,34,0.15);
      color: #e67e22;
    }
    
    /* Media */
    .media-container {
      margin-top: 16px;
    }
    
    .media-container img, 
    .media-container video {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }
    
    /* Comments Section */
    .comment-list {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    
    .comment-item {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(230,126,34,0.15);
    }
    
    .comment-author {
      font-weight: 600;
      font-size: 13px;
      color: #e67e22;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .comment-time {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    
    .comment-message {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }
    
    .official-badge {
      background: #e67e22;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 9px;
    }
    
    /* Form Elements */
    .status-select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(230,126,34,0.3);
      border-radius: 12px;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      color: #ffffff;
      margin-bottom: 16px;
    }
    
    .comment-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(230,126,34,0.3);
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.4);
      color: #ffffff;
    }
    
    .comment-input:focus,
    .status-select:focus {
      outline: none;
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.15);
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #e67e22, #f39c12);
      color: white;
      width: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230,126,34,0.4);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(230,126,34,0.5);
      color: #e67e22;
    }
    
    .btn-outline:hover {
      background: rgba(230,126,34,0.1);
      transform: translateY(-2px);
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #e67e22;
    }
    
    .error-state {
      text-align: center;
      padding: 60px;
    }
    
    .error-state h2 {
      color: #e67e22;
      margin-bottom: 16px;
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      z-index: 2000;
      font-size: 13px;
      box-shadow: 0 4px 15px rgba(230,126,34,0.3);
    }
    
    @media (max-width: 1024px) {
      .ticket-layout {
        flex-direction: column;
      }
      .left-column,
      .middle-column,
      .right-column {
        width: 100%;
      }
      .container {
        padding: 24px;
      }
      .navbar {
        padding: 16px 24px;
      }
    }
    
    @media (max-width: 768px) {
      .nav-buttons {
        gap: 10px;
      }
      .nav-btn {
        padding: 8px 16px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  
  <nav class="navbar">
    <div class="logo">
      <img src="logonobg.png" alt="CivicSays Logo">
    </div>
    <div class="nav-buttons">
      <a href="civicsays.html" class="nav-btn nav-btn-outline">← Back to Dashboard</a>
      <a href="index.html" class="nav-btn nav-btn-outline">🏠 Home</a>
    </div>
  </nav>
  
  <div class="container" id="ticketContainer">
    <div class="loading">Loading ticket details...</div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://gdovxbzzggdjwkbwsokp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkb3Z4Ynp6Z2dkandrYndzb2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIyNDgsImV4cCI6MjA5MDI0ODI0OH0.L9na-M72r4BL030Uq-yrEBrpgDilMXeJIckaVqUhlR0';
    const TABLE_NAME = 'tickets';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Check if user is logged in as official
    let isOfficialLoggedIn = localStorage.getItem('civicSaysOfficial') === 'true';
    
    // Get ticket ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('id');
    
    function getStatusText(status) {
      const map = { 'pending': 'Pending', 'in_process': 'In Process', 'hold': 'On Hold', 'solved': 'Solved' };
      return map[status] || status;
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    async function getTicketById(id) {
      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select('*')
        .eq('id', id)
        .single();
      
      if (error) return null;
      return data;
    }
    
    async function saveTicket(ticket) {
      const { error } = await supabaseClient
        .from(TABLE_NAME)
        .update({
          status: ticket.status,
          comments: ticket.comments
        })
        .eq('id', ticket.id);
      
      if (error) throw error;
    }
    
    async function renderTicket() {
      const container = document.getElementById('ticketContainer');
      
      if (!ticketId) {
        container.innerHTML = `
          <div class="error-state">
            <h2>❌ No Ticket ID Provided</h2>
            <p style="margin-bottom: 24px;">Please go back and enter a valid ticket ID.</p>
            <a href="civicsays.html" class="btn btn-primary" style="display: inline-block; width: auto; padding: 12px 32px;">Go to Dashboard</a>
          </div>
        `;
        return;
      }
      
      const ticket = await getTicketById(ticketId);
      
      if (!ticket) {
        container.innerHTML = `
          <div class="error-state">
            <h2>❌ Ticket Not Found</h2>
            <p style="margin-bottom: 24px;">The ticket with ID "${ticketId}" does not exist.</p>
            <a href="civicsays.html" class="btn btn-primary" style="display: inline-block; width: auto; padding: 12px 32px;">Go to Dashboard</a>
          </div>
        `;
        return;
      }
      
      // Media HTML for Issue Details
      const mediaHtml = ticket.media ? `
        <div class="media-container">
          <div class="info-label">Attachment</div>
          ${ticket.media_type === 'image' 
            ? `<img src="${ticket.media}" alt="Attachment">` 
            : `<video controls src="${ticket.media}"></video>`}
        </div>
      ` : '';
      
      const videoHtml = ticket.video_url ? `
        <div class="media-container">
          <div class="info-label">Video Link</div>
          <a href="${ticket.video_url}" target="_blank" class="btn btn-outline" style="display: inline-block; width: auto; margin-top: 8px;">Watch Video →</a>
        </div>
      ` : '';
      
      // Comments HTML for Right Column
      const comments = ticket.comments || [];
      const commentsHtml = comments.length > 0 
        ? comments.map(c => `
          <div class="comment-item">
            <div class="comment-author">
              ${c.isOfficial ? '👔 Official' : '👤 ' + escapeHtml(c.authorName)}
              ${c.isOfficial ? '<span class="official-badge">Government Official</span>' : ''}
            </div>
            <div class="comment-time">${new Date(c.timestamp).toLocaleString()}</div>
            <div class="comment-message">${escapeHtml(c.message)}</div>
          </div>
        `).join('') 
        : '<p style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">No comments yet</p>';
      
      // LEFT COLUMN HTML - Ticket Information + Contact Information
      const leftColumnHtml = `
        <div class="left-column">
          <!-- Ticket Information Card -->
          <div class="card">
            <div class="card-header">
              <h3>📋 TICKET INFORMATION</h3>
            </div>
            <div class="card-content">
              <div class="info-row">
                <div class="info-label">Ticket ID</div>
                <div class="info-value"><strong>${ticket.id}</strong></div>
              </div>
              <div class="info-row">
                <div class="info-label">Type</div>
                <div class="info-value"><span class="type-badge">${ticket.type}</span></div>
              </div>
              <div class="info-row">
                <div class="info-label">Status</div>
                <div class="info-value"><span class="status-badge status-${ticket.status}">${getStatusText(ticket.status)}</span></div>
              </div>
              <div class="info-row">
                <div class="info-label">Submitted</div>
                <div class="info-value">${new Date(ticket.created_at).toLocaleString()}</div>
              </div>
              ${isOfficialLoggedIn ? `
                <div style="margin-top: 24px; border-top: 1px solid rgba(230,126,34,0.2); padding-top: 20px;">
                  <div class="info-label">Update Status</div>
                  <select id="statusSelect" class="status-select">
                    <option value="pending" ${ticket.status === 'pending' ? 'selected' : ''}>Pending</option>
                    <option value="in_process" ${ticket.status === 'in_process' ? 'selected' : ''}>In Process</option>
                    <option value="hold" ${ticket.status === 'hold' ? 'selected' : ''}>On Hold</option>
                    <option value="solved" ${ticket.status === 'solved' ? 'selected' : ''}>Solved</option>
                  </select>
                  <button class="btn btn-primary" onclick="updateStatus('${ticket.id}')">Update Status</button>
                </div>
              ` : ''}
            </div>
          </div>
          
          <!-- Contact Information Card -->
          <div class="card">
            <div class="card-header">
              <h3>📞 CONTACT INFORMATION</h3>
            </div>
            <div class="card-content">
              <div class="info-row">
                <div class="info-label">Name</div>
                <div class="info-value">👤 ${escapeHtml(ticket.name)}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Phone Number</div>
                <div class="info-value">📱 ${escapeHtml(ticket.phone)}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Email Address</div>
                <div class="info-value">✉️ ${escapeHtml(ticket.email)}</div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // MIDDLE COLUMN HTML - Issue Details
      const middleColumnHtml = `
        <div class="middle-column">
          <div class="card">
            <div class="card-header">
              <h3>📝 ISSUE DETAILS</h3>
            </div>
            <div class="card-content">
              <div class="info-row">
                <div class="info-label">Location / Address</div>
                <div class="info-value">📍 ${escapeHtml(ticket.location)}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Title</div>
                <div class="info-value"><strong>${escapeHtml(ticket.title)}</strong></div>
              </div>
              <div class="info-row">
                <div class="info-label">Description</div>
                <div class="info-value">${escapeHtml(ticket.description)}</div>
              </div>
              ${mediaHtml}
              ${videoHtml}
            </div>
          </div>
        </div>
      `;
      
      // RIGHT COLUMN HTML - Comments
      const rightColumnHtml = `
        <div class="right-column">
          <div class="card">
            <div class="card-header">
              <h3>💬 COMMENTS</h3>
            </div>
            <div class="card-content">
              <div class="comment-list">${commentsHtml}</div>
              <textarea id="commentInput" class="comment-input" rows="3" placeholder="Write your comment here..."></textarea>
              <button class="btn btn-primary" onclick="addComment('${ticket.id}')">Post Comment</button>
            </div>
          </div>
        </div>
      `;
      
      container.innerHTML = `<div class="ticket-layout">${leftColumnHtml}${middleColumnHtml}${rightColumnHtml}</div>`;
    }
    
    async function updateStatus(ticketId) {
      const status = document.getElementById('statusSelect').value;
      const ticket = await getTicketById(ticketId);
      if (!ticket) return;
      
      ticket.status = status;
      ticket.comments = ticket.comments || [];
      ticket.comments.push({
        id: Date.now().toString(),
        authorName: 'System',
        message: `Status updated to: ${getStatusText(status)}`,
        isOfficial: true,
        timestamp: new Date().toISOString()
      });
      
      try {
        await saveTicket(ticket);
        showToast(`Status updated to ${getStatusText(status)}`);
        renderTicket();
      } catch (error) {
        showToast('Error updating status');
      }
    }
    
    async function addComment(ticketId) {
      const message = document.getElementById('commentInput')?.value;
      if (!message) {
        showToast('Please enter a comment');
        return;
      }
      
      const ticket = await getTicketById(ticketId);
      if (!ticket) return;
      
      ticket.comments = ticket.comments || [];
      ticket.comments.push({
        id: Date.now().toString(),
        authorName: isOfficialLoggedIn ? 'Government Official' : ticket.name,
        message: message,
        isOfficial: isOfficialLoggedIn,
        timestamp: new Date().toISOString()
      });
      
      try {
        await saveTicket(ticket);
        showToast('Comment posted');
        document.getElementById('commentInput').value = '';
        renderTicket();
      } catch (error) {
        showToast('Error posting comment');
      }
    }
    
    // Make functions global
    window.updateStatus = updateStatus;
    window.addComment = addComment;
    
    // Render the ticket
    renderTicket();
  </script>
</body>
</html>
