<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Government Request Tracker - Hold Your City Accountable</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    
    .header {
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .subtitle {
      font-size: 18px;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .card h2 {
      margin-bottom: 20px;
      color: #203a43;
    }
    
    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .city-card {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #e9ecef;
    }
    
    .city-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    .city-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .city-stats {
      display: flex;
      gap: 16px;
      margin: 12px 0;
      font-size: 14px;
      color: #666;
    }
    
    .response-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .response-fast {
      background: #d4edda;
      color: #155724;
    }
    
    .response-medium {
      background: #fff3cd;
      color: #856404;
    }
    
    .response-slow {
      background: #f8d7da;
      color: #721c24;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2c5364;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #203a43 0%, #2c5364 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(32,58,67,0.3);
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid #2c5364;
      color: #2c5364;
    }
    
    .request-item {
      border-bottom: 1px solid #e9ecef;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .request-item:hover {
      background: #f8f9fa;
    }
    
    .request-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-submitted { background: #fff3cd; color: #856404; }
    .status-investigating { background: #cfe2ff; color: #004085; }
    .status-in_progress { background: #d1ecf1; color: #0c5460; }
    .status-resolved { background: #d4edda; color: #155724; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #888;
    }
    
    .close:hover {
      color: #333;
    }
    
    .timeline {
      margin: 20px 0;
      padding-left: 20px;
      border-left: 2px solid #2c5364;
    }
    
    .timeline-item {
      margin-bottom: 20px;
      position: relative;
    }
    
    .timeline-dot {
      position: absolute;
      left: -26px;
      top: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2c5364;
    }
    
    .alert {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
    }
    
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .ranking-table th, .ranking-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e9ecef;
    }
    
    .ranking-table th {
      background: #f8f9fa;
      font-weight: 600;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 2px solid #e9ecef;
      margin-bottom: 20px;
    }
    
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: none;
      font-weight: 600;
    }
    
    .tab.active {
      border-bottom: 2px solid #2c5364;
      color: #2c5364;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 1100;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
      h1 { font-size: 32px; }
    }
    
    .tracking-link {
      background: #e8f0fe;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
      text-align: center;
    }
    
    .tracking-id {
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      color: #2c5364;
      margin: 8px 0;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏛️ Local Government Request Tracker</h1>
    <p class="subtitle">Report issues in your city. Track response times. Hold officials accountable.</p>
  </div>
  
  <div class="container">
    <!-- City Rankings -->
    <div class="card">
      <h2>🏆 City Rankings</h2>
      <div id="rankings" class="loading">Loading rankings...</div>
    </div>
    
    <!-- Main Content -->
    <div class="grid-2">
      <!-- Submit Request -->
      <div class="card">
        <h2>📝 Report an Issue</h2>
        <form id="reportForm">
          <div class="form-group">
            <label>Select Your City *</label>
            <select id="citySelect" required></select>
          </div>
          <div class="form-group">
            <label>Issue Category *</label>
            <select id="categorySelect" required></select>
          </div>
          <div class="form-group">
            <label>Location/Address *</label>
            <input type="text" id="address" placeholder="Street address or intersection" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Provide details about the issue..."></textarea>
          </div>
          <div class="form-group">
            <label>Your Name (optional)</label>
            <input type="text" id="reporterName" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Your Email (optional)</label>
            <input type="email" id="reporterEmail" placeholder="For tracking updates">
          </div>
          <button type="submit" class="btn btn-primary">Submit Request →</button>
        </form>
      </div>
      
      <!-- Track Request -->
      <div class="card">
        <h2>🔍 Track Your Request</h2>
        <div class="form-group">
          <label>Enter Tracking ID</label>
          <input type="text" id="trackingId" placeholder="e.g., REQ-ABC123">
          <button class="btn btn-outline" onclick="trackRequest()" style="margin-top: 12px;">Track Request</button>
        </div>
        <div id="trackingResult" style="margin-top: 20px;"></div>
      </div>
    </div>
    
    <!-- City Dashboard (dynamic) -->
    <div id="cityDashboard" style="display: none;">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 id="dashboardCityName"></h2>
          <button class="btn btn-outline" onclick="closeDashboard()">← Back to Cities</button>
        </div>
        
        <div class="tabs">
          <button class="tab active" onclick="switchTab('overview')">Overview</button>
          <button class="tab" onclick="switchTab('requests')">Requests</button>
        </div>
        
        <div id="overviewTab"></div>
        <div id="requestsTab" style="display: none;"></div>
      </div>
    </div>
  </div>
  
  <script>
    // Cities Data (static)
    const cities = [
      { id: '1', name: 'Springfield', state: 'IL', population: 150000, avgResponse: { pothole: 12, streetlight: 8, noise: 5, garbage: 4, graffiti: 10, tree: 12, water: 8, other: 10 } },
      { id: '2', name: 'Shelbyville', state: 'IL', population: 80000, avgResponse: { pothole: 18, streetlight: 10, noise: 7, garbage: 6, graffiti: 14, tree: 15, water: 10, other: 14 } },
      { id: '3', name: 'Capital City', state: 'IL', population: 250000, avgResponse: { pothole: 9, streetlight: 6, noise: 4, garbage: 3, graffiti: 8, tree: 9, water: 6, other: 8 } },
      { id: '4', name: 'Oakland', state: 'CA', population: 440000, avgResponse: { pothole: 45, streetlight: 30, noise: 20, garbage: 15, graffiti: 25, tree: 35, water: 20, other: 35 } },
      { id: '5', name: 'Austin', state: 'TX', population: 960000, avgResponse: { pothole: 14, streetlight: 9, noise: 6, garbage: 5, graffiti: 12, tree: 14, water: 9, other: 12 } }
    ];
    
    const categories = [
      { id: 'pothole', name: '🕳️ Pothole', icon: '🕳️' },
      { id: 'streetlight', name: '💡 Broken Streetlight', icon: '💡' },
      { id: 'noise', name: '🔊 Noise Complaint', icon: '🔊' },
      { id: 'garbage', name: '🗑️ Missed Garbage', icon: '🗑️' },
      { id: 'graffiti', name: '🎨 Graffiti', icon: '🎨' },
      { id: 'tree', name: '🌳 Fallen Tree', icon: '🌳' },
      { id: 'water', name: '💧 Water Leak', icon: '💧' },
      { id: 'other', name: '📋 Other', icon: '📋' }
    ];
    
    // IndexedDB Setup
    let db = null;
    let currentCityId = null;
    
    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('GovernmentTrackerDB', 1);
        
        request.onerror = () => reject(request.error);
        
        request.onsuccess = () => {
          db = request.result;
          resolve(db);
        };
        
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          
          // Create requests store
          if (!db.objectStoreNames.contains('requests')) {
            const store = db.createObjectStore('requests', { keyPath: 'id' });
            store.createIndex('cityId', 'cityId', { unique: false });
            store.createIndex('status', 'status', { unique: false });
            store.createIndex('createdAt', 'createdAt', { unique: false });
          }
        };
      });
    }
    
    // Save request to IndexedDB
    async function saveRequest(request) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['requests'], 'readwrite');
        const store = transaction.objectStore('requests');
        const request_ = store.put(request);
        
        request_.onsuccess = () => resolve();
        request_.onerror = () => reject(request_.error);
      });
    }
    
    // Get all requests
    async function getAllRequests() {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['requests'], 'readonly');
        const store = transaction.objectStore('requests');
        const request_ = store.getAll();
        
        request_.onsuccess = () => resolve(request_.result);
        request_.onerror = () => reject(request_.error);
      });
    }
    
    // Get requests by city
    async function getRequestsByCity(cityId) {
      const allRequests = await getAllRequests();
      return allRequests.filter(r => r.cityId === cityId);
    }
    
    // Get request by ID
    async function getRequestById(id) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['requests'], 'readonly');
        const store = transaction.objectStore('requests');
        const request_ = store.get(id);
        
        request_.onsuccess = () => resolve(request_.result);
        request_.onerror = () => reject(request_.error);
      });
    }
    
    function generateTrackingId() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let id = 'REQ-';
      for (let i = 0; i < 6; i++) {
        id += chars[Math.floor(Math.random() * chars.length)];
      }
      return id;
    }
    
    function getCategoryName(categoryId) {
      return categories.find(c => c.id === categoryId)?.name || categoryId;
    }
    
    // Submit new request
    document.getElementById('reportForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const cityId = document.getElementById('citySelect').value;
      const category = document.getElementById('categorySelect').value;
      const address = document.getElementById('address').value;
      const description = document.getElementById('description').value;
      const reporterName = document.getElementById('reporterName').value;
      const reporterEmail = document.getElementById('reporterEmail').value;
      
      if (!cityId || !category || !address) {
        alert('Please fill in required fields');
        return;
      }
      
      const trackingId = generateTrackingId();
      const city = cities.find(c => c.id === cityId);
      
      const newRequest = {
        id: trackingId,
        cityId,
        cityName: city.name,
        category,
        title: `${getCategoryName(category)} at ${address}`,
        description,
        address,
        status: 'submitted',
        statusHistory: [{ status: 'submitted', timestamp: new Date().toISOString() }],
        reporterName,
        reporterEmail,
        createdAt: new Date().toISOString(),
        resolvedAt: null,
        responseTime: null,
        updates: []
      };
      
      await saveRequest(newRequest);
      
      alert(`✅ Request submitted!\n\nTracking ID: ${trackingId}\n\nSave this ID to track your request status.`);
      
      // Reset form
      document.getElementById('reportForm').reset();
      
      // Refresh everything
      loadRankings();
      if (currentCityId) {
        loadCityStats(currentCityId);
      }
    });
    
    // Track request by ID
    async function trackRequest() {
      const trackingId = document.getElementById('trackingId').value.trim().toUpperCase();
      if (!trackingId) {
        alert('Please enter a tracking ID');
        return;
      }
      
      const request = await getRequestById(trackingId);
      const resultDiv = document.getElementById('trackingResult');
      
      if (!request) {
        resultDiv.innerHTML = '<div class="alert">❌ Request not found. Check your tracking ID.</div>';
        return;
      }
      
      const daysPending = !request.resolvedAt 
        ? Math.ceil((new Date() - new Date(request.createdAt)) / (1000 * 60 * 60 * 24))
        : null;
      
      const city = cities.find(c => c.id === request.cityId);
      const cityAvg = city?.avgResponse[request.category] || 10;
      const isBehind = daysPending && daysPending > cityAvg;
      
      resultDiv.innerHTML = `
        <div style="padding: 16px; background: #f8f9fa; border-radius: 12px;">
          <div style="font-weight: bold; font-size: 18px;">${request.title}</div>
          <div style="margin-top: 8px;"><strong>Status:</strong> <span class="request-status status-${request.status}">${request.status.replace('_', ' ')}</span></div>
          <div><strong>Submitted:</strong> ${new Date(request.createdAt).toLocaleDateString()}</div>
          ${daysPending ? `<div><strong>Days pending:</strong> ${daysPending} days</div>` : ''}
          ${isBehind ? `<div style="color: #dc3545; margin-top: 8px;">⚠️ This request is taking longer than the city average (${cityAvg} days)</div>` : ''}
          ${request.resolvedAt ? `<div><strong>Resolved:</strong> ${new Date(request.resolvedAt).toLocaleDateString()}</div>` : ''}
          <div style="margin-top: 12px;"><strong>Location:</strong> ${request.address}</div>
          ${request.description ? `<div><strong>Description:</strong> ${request.description}</div>` : ''}
        </div>
      `;
    }
    
    // Load city rankings
    async function loadRankings() {
      const allRequests = await getAllRequests();
      
      const cityStats = cities.map(city => {
        const cityRequests = allRequests.filter(r => r.cityId === city.id);
        const resolvedRequests = cityRequests.filter(r => r.resolvedAt);
        const totalRequests = cityRequests.length;
        const resolutionRate = totalRequests > 0 ? Math.round((resolvedRequests.length / totalRequests) * 100) : 0;
        
        let avgPotholeTime = city.avgResponse.pothole;
        const potholeRequests = resolvedRequests.filter(r => r.category === 'pothole');
        if (potholeRequests.length > 0) {
          const totalDays = potholeRequests.reduce((sum, r) => sum + (r.responseTime || city.avgResponse.pothole), 0);
          avgPotholeTime = Math.round(totalDays / potholeRequests.length);
        }
        
        return { ...city, totalRequests, resolutionRate, avgPotholeTime };
      });
      
      cityStats.sort((a, b) => a.avgPotholeTime - b.avgPotholeTime);
      
      const getResponseClass = (days) => {
        if (days <= 10) return 'response-fast';
        if (days <= 20) return 'response-medium';
        return 'response-slow';
      };
      
      const html = `
        <table class="ranking-table">
          <thead>
            <tr><th>Rank</th><th>City</th><th>Pothole Response</th><th>Resolution Rate</th><th>Active Requests</th> </tr>
          </thead>
          <tbody>
            ${cityStats.map((city, i) => `
              <tr style="cursor: pointer;" onclick="viewCity('${city.id}')">
                <td>${i + 1}</td>
                <td><strong>${city.name}</strong>, ${city.state}</td>
                <td><span class="response-badge ${getResponseClass(city.avgPotholeTime)}">${city.avgPotholeTime} days</span></td>
                <td>${city.resolutionRate}%</td>
                <td>${city.totalRequests}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      document.getElementById('rankings').innerHTML = html;
    }
    
    async function viewCity(cityId) {
      currentCityId = cityId;
      await loadCityStats(cityId);
      document.getElementById('cityDashboard').style.display = 'block';
      document.getElementById('cityDashboard').scrollIntoView({ behavior: 'smooth' });
    }
    
    async function loadCityStats(cityId) {
      const city = cities.find(c => c.id === cityId);
      const cityRequests = await getRequestsByCity(cityId);
      const resolvedRequests = cityRequests.filter(r => r.resolvedAt);
      
      document.getElementById('dashboardCityName').innerHTML = `📊 ${city.name}, ${city.state}`;
      
      const byCategory = {};
      for (const cat of categories) {
        const catRequests = cityRequests.filter(r => r.category === cat.id);
        const catResolved = catRequests.filter(r => r.resolvedAt);
        byCategory[cat.id] = {
          total: catRequests.length,
          open: catRequests.filter(r => !r.resolvedAt).length,
          resolved: catResolved.length,
          avgTime: catResolved.length > 0 
            ? Math.round(catResolved.reduce((sum, r) => sum + (r.responseTime || city.avgResponse[cat.id]), 0) / catResolved.length)
            : city.avgResponse[cat.id]
        };
      }
      
      const overviewHtml = `
        <div class="grid-2">
          <div>
            <h3>📈 Statistics</h3>
            <p><strong>Population:</strong> ${city.population.toLocaleString()}</p>
            <p><strong>Total Requests:</strong> ${cityRequests.length}</p>
            <p><strong>Open Requests:</strong> ${cityRequests.filter(r => !r.resolvedAt).length}</p>
            <p><strong>Resolved Requests:</strong> ${resolvedRequests.length}</p>
            <p><strong>Resolution Rate:</strong> ${cityRequests.length > 0 ? Math.round((resolvedRequests.length / cityRequests.length) * 100) : 0}%</p>
          </div>
          <div>
            <h3>📋 Response Times by Category</h3>
            ${Object.entries(byCategory).map(([catId, data]) => `
              <p><strong>${categories.find(c => c.id === catId)?.icon} ${categories.find(c => c.id === catId)?.name}:</strong> ${data.avgTime} days avg (${data.open} open)</p>
            `).join('')}
          </div>
        </div>
        <div style="margin-top: 20px;">
          <h3>⚠️ Recent Issues</h3>
          <div id="cityRecentRequests"></div>
        </div>
      `;
      
      document.getElementById('overviewTab').innerHTML = overviewHtml;
      await loadCityRequests(cityId);
    }
    
    async function loadCityRequests(cityId) {
      const cityRequests = await getRequestsByCity(cityId);
      cityRequests.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      
      const requestsHtml = `
        <div>
          ${cityRequests.map(r => `
            <div class="request-item" onclick="viewRequest('${r.id}')">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <strong>${getCategoryName(r.category)}</strong>
                  <div style="font-size: 14px; color: #666; margin-top: 4px;">${r.address}</div>
                </div>
                <div>
                  <span class="request-status status-${r.status}">${r.status.replace('_', ' ')}</span>
                </div>
              </div>
              <div style="font-size: 12px; color: #888; margin-top: 8px;">
                Submitted: ${new Date(r.createdAt).toLocaleDateString()}
                ${!r.resolvedAt ? ` • Pending: ${Math.ceil((new Date() - new Date(r.createdAt)) / (1000*60*60*24))} days` : ` • Resolved in ${r.responseTime || '?'} days`}
              </div>
            </div>
          `).join('')}
          ${cityRequests.length === 0 ? '<p style="color: #888; text-align: center;">No requests submitted yet</p>' : ''}
        </div>
      `;
      
      document.getElementById('requestsTab').innerHTML = requestsHtml;
      document.getElementById('cityRecentRequests').innerHTML = cityRequests.slice(0, 5).map(r => `
        <div class="request-item" onclick="viewRequest('${r.id}')" style="padding: 12px; margin-bottom: 8px;">
          <strong>${getCategoryName(r.category)}</strong>
          <span class="request-status status-${r.status}" style="float: right;">${r.status.replace('_', ' ')}</span>
          <div style="font-size: 12px; color: #666;">${r.address}</div>
        </div>
      `).join('') || '<p>No recent requests</p>';
    }
    
    async function viewRequest(requestId) {
      const request = await getRequestById(requestId);
      if (!request) return;
      
      const daysPending = !request.resolvedAt 
        ? Math.ceil((new Date() - new Date(request.createdAt)) / (1000 * 60 * 60 * 24))
        : null;
      
      const city = cities.find(c => c.id === request.cityId);
      const cityAvg = city?.avgResponse[request.category] || 10;
      const isBehind = daysPending && daysPending > cityAvg;
      
      const modalHtml = `
        <div class="modal-content">
          <span class="close" onclick="closeModal()">&times;</span>
          <h2>${getCategoryName(request.category)}</h2>
          <p style="color: #666; margin: 8px 0;">Tracking ID: ${request.id}</p>
          
          ${isBehind ? `
            <div class="alert">
              ⚠️ This request is taking longer than the city average (${cityAvg} days). Current wait: ${daysPending} days.
            </div>
          ` : ''}
          
          <div><strong>Location:</strong> ${request.address}</div>
          <div><strong>Status:</strong> <span class="request-status status-${request.status}">${request.status.replace('_', ' ')}</span></div>
          <div><strong>Submitted:</strong> ${new Date(request.createdAt).toLocaleString()}</div>
          ${request.resolvedAt ? `<div><strong>Resolved:</strong> ${new Date(request.resolvedAt).toLocaleString()}</div>` : ''}
          ${request.responseTime ? `<div><strong>Response Time:</strong> ${request.responseTime} days</div>` : ''}
          
          ${request.description ? `<div style="margin-top: 16px;"><strong>Description:</strong><br>${request.description}</div>` : ''}
          
          <div class="timeline" style="margin-top: 20px;">
            <strong>Timeline</strong>
            ${request.statusHistory.map(h => `
              <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div><strong>${h.status.replace('_', ' ').toUpperCase()}</strong></div>
                <div style="font-size: 12px; color: #666;">${new Date(h.timestamp).toLocaleString()}</div>
              </div>
            `).join('')}
          </div>
          
          <button class="btn btn-outline" onclick="closeModal()" style="margin-top: 16px;">Close</button>
        </div>
      `;
      
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.style.display = 'flex';
      modal.innerHTML = modalHtml;
      document.body.appendChild(modal);
      
      window.closeModal = () => modal.remove();
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function closeDashboard() {
      document.getElementById('cityDashboard').style.display = 'none';
      currentCityId = null;
    }
    
    function switchTab(tab) {
      const overviewTab = document.getElementById('overviewTab');
      const requestsTab = document.getElementById('requestsTab');
      const tabs = document.querySelectorAll('.tab');
      
      tabs.forEach(t => t.classList.remove('active'));
      
      if (tab === 'overview') {
        overviewTab.style.display = 'block';
        requestsTab.style.display = 'none';
        tabs[0].classList.add('active');
      } else {
        overviewTab.style.display = 'none';
        requestsTab.style.display = 'block';
        tabs[1].classList.add('active');
      }
    }
    
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Initialize page
    async function init() {
      await openDatabase();
      
      // Populate city dropdown
      const citySelect = document.getElementById('citySelect');
      citySelect.innerHTML = '<option value="">Select your city</option>' + 
        cities.map(c => `<option value="${c.id}">${c.name}, ${c.state}</option>`).join('');
      
      // Populate category dropdown
      const categorySelect = document.getElementById('categorySelect');
      categorySelect.innerHTML = categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
      
      await loadRankings();
    }
    
    init();
  </script>
</body>
</html>
