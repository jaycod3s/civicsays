<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Says</title>
</head>
<body>
    <h1>Welcome to Civic Says</h1>

    <section id="resident-form">
        <h2>Resident Form</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" required>
            <br>
            <input type="submit" value="Submit">
        </form>
    </section>

    <section id="official-dashboard">
        <h2>Official Dashboard</h2>
        <table>
            <tr>
                <th>Resident</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>John Doe</td>
                <td>Pending</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>Approved</td>
            </tr>
        </table>
    </section>

    <div id="modal">
        <h3>Modal Title</h3>
        <p>This is a modal!</p>
        <button>Close</button>
    </div>
</body>
</html>
