<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="status">Connecting...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Single initialization
        const SUPABASE_URL = 'https://gdovxbzzggdjwkbwsokp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkb3Z4Ynp6Z2dkandrYndzb2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIyNDgsImV4cCI6MjA5MDI0ODI0OH0.L9na-M72r4BL030Uq-yrEBrpgDilMXeJIckaVqUhlR0';
        
        // Check if supabase is available
        if (typeof supabase === 'undefined') {
            document.getElementById('status').innerHTML = 'Error: Supabase library not loaded';
            throw new Error('Supabase library not loaded');
        }
        
        // Create client (only once)
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('status').innerHTML = 'Connected to Supabase!';
        
        // Test function
        async function testConnection() {
            try {
                const { data, error } = await supabaseClient
                    .from('tickets')
                    .select('*')
                    .limit(5);
                
                if (error) {
                    console.error('Query error:', error);
                    document.getElementById('status').innerHTML = 'Query failed: ' + error.message;
                } else {
                    console.log('Data:', data);
                    document.getElementById('status').innerHTML = 'Success! Check console for data';
                }
            } catch (err) {
                console.error('Connection error:', err);
                document.getElementById('status').innerHTML = 'Error: ' + err.message;
            }
        }
        
        // Run test
        testConnection();
    </script>
</body>
</html>
